<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لولو حبيبتي ونور عيني♥</title>
<link rel="icon" href="https://i.ibb.co/ymDLBtLn/IMG-8436.jpg">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Cairo', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
    color:white;
    text-align:center;
    padding:30px 0;
}

.container{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
    max-width:900px;
    width:95%;
}

h1{
    font-size:32px;
    margin-bottom:15px;
}

p{
    font-size:20px;
    margin-bottom:25px;
}

.counter{
    font-size:22px;
    font-weight:bold;
    margin-bottom:30px;
}

/* 🔥 جاليري الصور */
.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.6);
    transition:0.4s ease;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* زرار */
button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4f81;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffe3ec;
    transform:scale(1.05);
}

/* 💌 رسالة */
.message-box{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:white;
    color:#ff4f81;
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    width:90%;
    max-width:400px;
    opacity:0;
    visibility:hidden;
    transition:0.4s ease;
    z-index:1000;
}

.message-box.active{
    opacity:1;
    visibility:visible;
    transform:translate(-50%,-50%) scale(1);
}

.close-btn{
    margin-top:15px;
    background:#ff4f81;
    color:white;
    padding:8px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    opacity:0;
    visibility:hidden;
    transition:0.4s;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

/* قلوب */
.heart{
    position:absolute;
    bottom:-10px;
    color:white;
    font-size:20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<script>
const engagementDate = new Date("2025-12-04");

function updateCounter(){
    const now = new Date();
    const diff = now - engagementDate;
    const days = Math.floor(diff / (1000*60*60*24));
    const months = Math.floor(days / 30);
    document.getElementById("counter").innerHTML =
        `❤️عدي علينا 3 شهور وانتي خطيبتي ونور عيني `;
}

updateCounter();
setInterval(updateCounter,1000);

function showMessage(){
    document.getElementById("messageBox").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMessage(){
    document.getElementById("messageBox").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,400);
</script>
    <h1>💍مع بعض العمر كله يا يارو بحبك اد الدنيا♥</h1>

    <p>
        من يوم ما لبستك الدبلة 💖  
        والدنيا بقت أجمل بوجودك 🌸  
        ربنا يديمك نعمة في حياتي ✨
    </p>

    <div class="counter" id="counter"></div>

    <!-- 🔥 الجاليري -->
    <div class="gallery">
        <img src="https://i.ibb.co/Kj4WTdnY/Screenshot-20260303-162420.jpg">
        <img src="https://i.ibb.co/v4cgwBvg/IMG-20251013-WA0197.jpg">
        <img src="https://i.ibb.co/0jhwdCd5/Snapchat-1227168712.jpg">
        <img src="https://i.ibb.co/RW9qjdd/IMG-20251219-WA0027.jpg">
        <img src="https://i.ibb.co/NXv9nQ5/Snapchat-812134097.jpg">
        <img src="https://i.ibb.co/7dc3GMR7/Snapchat-444857346.jpg">
        <img src="https://i.ibb.co/WWNKjMbc/Snapchat-862495526.jpg">
        <img src="https://i.ibb.co/pjV7HRVs/IMG-8261.jpg">
        <img src="https://i.ibb.co/5w5fb0D/IMG-20251205-WA0219-1.jpg">
        <img src="https://i.ibb.co/ymTCmCN4/Picsart-25-12-05-12-53-29-435.jpg">
        <img src="https://i.ibb.co/0yz044QB/Picsart-25-12-05-12-52-56-141.jpg">
    </div>

    <button onclick="showMessage()">private message 💌</button>

</div>

<div class="overlay" id="overlay" onclick="closeMessage()"></div>

<div class="message-box" id="messageBox">
    <h2>رسالة ليكي ❤️</h2>
    <p>
        كل شهر وإنتِ قلبي وروحي وحياتي 💍  
        وجودك جنبي هو أحلى حاجة حصلتلي ✨  
        بحبك أكتر من أي كلام يتقال ❤️
    </p>
    <button class="close-btn" onclick="closeMessage()">إغلاق</button>
</div>



</body>
</html>
