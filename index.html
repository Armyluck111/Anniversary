<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لولو حبيبتي ونور عيني♥</title>
    <link rel="icon"  href="https://i.ibb.co/ymDLBtLn/IMG-8436.jpg">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Cairo', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    text-align:center;
}

.container{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
    max-width:600px;
}

h1{
    font-size:36px;
    margin-bottom:15px;
}

p{
    font-size:20px;
    margin-bottom:25px;
}

.counter{
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4f81;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ffe3ec;
    transform:scale(1.05);
}

/* قلوب متحركة */
.heart{
    position:absolute;
    bottom:-10px;
    color:white;
    font-size:20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    100%{
        transform:translateY(-100vh) scale(1.5);
        opacity:0;
    }
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>💍 3 شهور من أجمل أيام حياتي ❤️</h1>
    <p>
        من يوم ما لبستك الدبلة 💖  
        والدنيا بقت أجمل بوجودك 🌸  
        ربنا يديمك نعمة في حياتي يا أجمل نصيب ✨
    </p>

    <div class="counter" id="counter"></div>

    <button onclick="showMessage()">رسالة خاصة 💌</button>
</div>

<script>
// 🔥 غير التاريخ ده بتاريخ خطوبتك
const engagementDate = new Date("2025-12-01");

function updateCounter(){
    const now = new Date();
    const diff = now - engagementDate;

    const days = Math.floor(diff / (1000*60*60*24));
    const months = Math.floor(days / 30);

    document.getElementById("counter").innerHTML =
        `عدّى علينا تقريباً ${months} شهر و ${days} يوم حب ❤️`;
}

updateCounter();
setInterval(updateCounter,1000);

// رسالة
function showMessage(){
    alert("كل شهر وإنتِ قلبي وروحي وحياتي ❤️💍");
}

// قلوب عشوائية
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,400);
</script>

</body>
</html>
